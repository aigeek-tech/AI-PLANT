services:
  postgres:
    image: postgres:16
    container_name: smart-design-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_design}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./mounts/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: smart-design-minio
    profiles:
      - internal-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: "${MINIO_API_CORS_ALLOW_ORIGIN:-http://127.0.0.1:5173,http://localhost:5173}"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${S3_BUCKET:-smart-design-documents}
      MINIO_INIT_ENDPOINT: ${MINIO_INIT_ENDPOINT:-http://minio:9000}
    volumes:
      - ./sample-data/minio:/sample-data/minio:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local \"$${MINIO_INIT_ENDPOINT}\" \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing \"local/$${MINIO_BUCKET_NAME}\" &&
      if [ -d \"/sample-data/minio/$${MINIO_BUCKET_NAME}\" ]; then
        mc mirror --overwrite \"/sample-data/minio/$${MINIO_BUCKET_NAME}\" \"local/$${MINIO_BUCKET_NAME}\";
      else
        echo \"No bundled MinIO sample data found for $${MINIO_BUCKET_NAME}\";
      fi
      "

  kkfileview:
    image: ymlisoft/kkfileview:4.4.0-12
    container_name: smart-design-kkfileview
    ports:
      - "${KKFILEVIEW_PORT:-8012}:8012"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KK_FILE_UPLOAD_ENABLED: "false"
      JAVA_OPTS: "-Xms512m -Xmx4g -XX:+UseG1GC"
      KK_CAD_PREVIEW_TYPE: "pdf"
      KK_CAD_THREAD: "1"
      KK_CAD_TIMEOUT: "180"
      KK_OFFICE_PREVIEW_TYPE: "pdf"
      KK_DELETE_SOURCE_FILE: "false"

  backend:
    image: smart-design-backend:local
    container_name: smart-design-backend
    env_file:
      - ./config/backend.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-smart_design}}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PREVIEW_ENDPOINT: ${S3_PREVIEW_ENDPOINT:-http://127.0.0.1:9000}
      S3_BUCKET: ${S3_BUCKET:-smart-design-documents}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SMART_DESIGN_BOOTSTRAP_ADMIN_USERNAME: ${SMART_DESIGN_BOOTSTRAP_ADMIN_USERNAME:-admin}
      SMART_DESIGN_BOOTSTRAP_ADMIN_PASSWORD: ${SMART_DESIGN_BOOTSTRAP_ADMIN_PASSWORD:-AIGeek@2025}
      SMART_DESIGN_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${SMART_DESIGN_BOOTSTRAP_ADMIN_DISPLAY_NAME:-System Admin}
      SMART_DESIGN_BOOTSTRAP_ADMIN_EMAIL: ${SMART_DESIGN_BOOTSTRAP_ADMIN_EMAIL:-admin@example.local}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      kkfileview:
        condition: service_started

  document-converter:
    image: smart-design-document-converter:local
    container_name: smart-design-document-converter
    working_dir: /workspace/backend
    env_file:
      - ./config/backend.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-smart_design}}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-smart-design-documents}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DOCUMENT_CONVERSION_WORKDIR: /tmp/smart-design-document-conversion
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./data/document-conversion:/tmp/smart-design-document-conversion
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: smart-design-frontend:local
    container_name: smart-design-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    volumes:
      - ./config/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
